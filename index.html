<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Terminal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Consolas', 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    background: #16213e;
    color: #e94560;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    border-bottom: 1px solid #0f3460;
  }

  .titlebar .dots {
    display: flex;
    gap: 6px;
  }

  .titlebar .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }

  .toolbar {
    background: #16213e;
    padding: 6px 16px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #0f3460;
  }

  .toolbar select, .toolbar button {
    background: #0f3460;
    color: #e2e2e2;
    border: 1px solid #533483;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  .toolbar button:hover {
    background: #533483;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    color: #e2e2e2;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  #output::-webkit-scrollbar { width: 8px; }
  #output::-webkit-scrollbar-track { background: #1a1a2e; }
  #output::-webkit-scrollbar-thumb { background: #533483; border-radius: 4px; }

  .output-line { margin-bottom: 2px; }
  .output-line.error { color: #e94560; }
  .output-line.warn { color: #ffbd2e; }
  .output-line.info { color: #53cfcf; }
  .output-line.result { color: #27c93f; }
  .output-line.input-echo { color: #888; }

  .input-area {
    display: flex;
    align-items: flex-start;
    padding: 8px 16px 12px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    gap: 8px;
  }

  .prompt {
    color: #27c93f;
    padding-top: 8px;
    font-size: 14px;
    user-select: none;
  }

  #input {
    flex: 1;
    background: #0f3460;
    color: #e2e2e2;
    border: 1px solid #533483;
    border-radius: 4px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 38px;
    max-height: 200px;
    outline: none;
    line-height: 1.5;
  }

  #input:focus {
    border-color: #e94560;
    box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.2);
  }

  .run-btn {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    font-weight: bold;
    white-space: nowrap;
  }

  .run-btn:hover { background: #c73652; }
  .run-btn:disabled { background: #666; cursor: not-allowed; }

  .loading-banner {
    background: #0f3460;
    color: #53cfcf;
    text-align: center;
    padding: 6px;
    font-size: 12px;
    display: none;
  }

  .loading-banner.show { display: block; }
</style>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</head>
<body>

<div class="titlebar">
  <div class="dots">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
  </div>
  <span>Web Terminal</span>
</div>

<div class="toolbar">
  <select id="lang">
    <option value="javascript">JavaScript</option>
    <option value="python">Python</option>
    <option value="html">HTML (render)</option>
  </select>
  <button onclick="clearOutput()">Clear</button>
</div>

<div class="loading-banner" id="pyLoading">Loading Python engine... please wait</div>

<div id="output">
<div class="output-line info">Welcome to Web Terminal. Type code below and press Run or Shift+Enter.</div>
</div>

<div class="input-area">
  <span class="prompt">&gt;</span>
  <textarea id="input" rows="1" placeholder="Enter code here..." spellcheck="false"></textarea>
  <button class="run-btn" onclick="runCode()">Run</button>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const langSelect = document.getElementById('lang');
const runBtn = document.querySelector('.run-btn');
const pyLoading = document.getElementById('pyLoading');
const cmdHistory = [];
let historyIndex = -1;
let pyodide = null;
let pyodideReady = false;
let pyodideLoading = false;

function addLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'output-line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function addHTML(html) {
  const div = document.createElement('div');
  div.className = 'output-line';
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;min-height:150px;border:1px solid #533483;border-radius:4px;background:#fff;';
  div.appendChild(iframe);
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  setTimeout(() => {
    iframe.style.height = Math.min(400, Math.max(100, doc.body.scrollHeight + 20)) + 'px';
  }, 100);
}

function formatValue(val) {
  if (val === undefined) return 'undefined';
  if (val === null) return 'null';
  if (typeof val === 'function') return val.toString();
  try { return JSON.stringify(val, null, 2); } catch { return String(val); }
}

// Load Pyodide when Python is first selected or used
async function initPyodide() {
  if (pyodideReady || pyodideLoading) return;
  pyodideLoading = true;
  pyLoading.classList.add('show');
  runBtn.disabled = true;
  runBtn.textContent = 'Loading...';
  try {
    pyodide = await loadPyodide();
    // Redirect Python stdout/stderr to our terminal
    pyodide.runPython(`
import sys
from io import StringIO

class TerminalOut:
    def __init__(self, is_err=False):
        self.is_err = is_err
        self.buffer = ""
    def write(self, text):
        self.buffer += text
    def flush(self):
        pass
    def get_and_clear(self):
        out = self.buffer
        self.buffer = ""
        return out

sys.stdout = TerminalOut(False)
sys.stderr = TerminalOut(True)
`);
    pyodideReady = true;
    addLine('Python engine loaded successfully.', 'info');
  } catch (err) {
    addLine('Failed to load Python: ' + err.toString(), 'error');
  }
  pyodideLoading = false;
  pyLoading.classList.remove('show');
  runBtn.disabled = false;
  runBtn.textContent = 'Run';
}

// Start loading Python when selected
langSelect.addEventListener('change', () => {
  if (langSelect.value === 'python' && !pyodideReady) {
    initPyodide();
  }
});

async function runPython(code) {
  if (!pyodideReady) {
    await initPyodide();
    if (!pyodideReady) return;
  }

  addLine('>>> ' + code, 'input-echo');
  runBtn.disabled = true;
  runBtn.textContent = 'Running...';

  try {
    const result = pyodide.runPython(code);

    // Get stdout
    const stdout = pyodide.runPython('sys.stdout.get_and_clear()');
    if (stdout) {
      stdout.split('\n').forEach(line => {
        if (line !== '') addLine(line);
      });
    }

    // Get stderr
    const stderr = pyodide.runPython('sys.stderr.get_and_clear()');
    if (stderr) {
      stderr.split('\n').forEach(line => {
        if (line !== '') addLine(line, 'error');
      });
    }

    // Show return value if not None
    if (result !== undefined && result !== null) {
      const resultStr = String(result);
      if (resultStr !== 'None') {
        addLine(resultStr, 'result');
      }
    }
  } catch (err) {
    // Get any stderr output before the error
    try {
      const stderr = pyodide.runPython('sys.stderr.get_and_clear()');
      if (stderr) {
        stderr.split('\n').forEach(line => {
          if (line !== '') addLine(line, 'error');
        });
      }
    } catch {}
    addLine(err.message, 'error');
  }

  runBtn.disabled = false;
  runBtn.textContent = 'Run';
}

function runJS(code) {
  addLine('> ' + code, 'input-echo');

  const origLog = console.log;
  const origWarn = console.warn;
  const origError = console.error;
  const origInfo = console.info;

  console.log = (...args) => { addLine(args.map(formatValue).join(' ')); origLog(...args); };
  console.warn = (...args) => { addLine(args.map(formatValue).join(' '), 'warn'); origWarn(...args); };
  console.error = (...args) => { addLine(args.map(formatValue).join(' '), 'error'); origError(...args); };
  console.info = (...args) => { addLine(args.map(formatValue).join(' '), 'info'); origInfo(...args); };

  try {
    const result = eval(code);
    if (result !== undefined) {
      addLine(formatValue(result), 'result');
    }
  } catch (err) {
    addLine(err.toString(), 'error');
  }

  console.log = origLog;
  console.warn = origWarn;
  console.error = origError;
  console.info = origInfo;
}

async function runCode() {
  const code = input.value.trim();
  if (!code) return;

  cmdHistory.push(code);
  historyIndex = cmdHistory.length;

  const lang = langSelect.value;

  if (lang === 'html') {
    addLine('> [HTML rendered below]', 'input-echo');
    addHTML(code);
  } else if (lang === 'python') {
    await runPython(code);
  } else {
    runJS(code);
  }

  input.value = '';
  input.style.height = '38px';
  input.focus();
}

function clearOutput() {
  output.innerHTML = '';
  addLine('Terminal cleared.', 'info');
}

// Shift+Enter to run, Enter for newline, arrow keys for history
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    runCode();
  } else if (e.key === 'ArrowUp' && input.value === '') {
    if (historyIndex > 0) {
      historyIndex--;
      input.value = cmdHistory[historyIndex];
    }
    e.preventDefault();
  } else if (e.key === 'ArrowDown' && input.value !== '') {
    if (historyIndex < cmdHistory.length - 1) {
      historyIndex++;
      input.value = cmdHistory[historyIndex];
    } else {
      historyIndex = cmdHistory.length;
      input.value = '';
    }
    e.preventDefault();
  }
});

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = '38px';
  input.style.height = Math.min(200, input.scrollHeight) + 'px';
});

input.focus();
</script>
</body>
</html>
